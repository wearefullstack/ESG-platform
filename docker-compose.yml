version: '3.9'

services:
  # Reverse proxy
  nginx:
    build: ./nginx
    container_name: esg-nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - esg-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # Flask backend API
  backend:
    build: ./backend
    container_name: esg-backend
    expose:
      - "5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Flask config
      FLASK_APP: wsgi.py
      FLASK_ENV: development
      FLASK_DEBUG: 0

      # Database
      DATABASE_URL: postgresql://esg_user:esg_password@postgres:5432/esg_platform
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: esg_platform
      DB_USER: esg_user
      DB_PASSWORD: esg_password

      # Redis
      REDIS_URL: redis://redis:6379/0

      # Security
      SECRET_KEY: dev-secret-key-change-in-production
      JWT_SECRET_KEY: dev-jwt-key-change-in-production

      # API
      API_HOST: 0.0.0.0
      API_PORT: 5000
      API_DEBUG: "True"

      # CORS
      CORS_ORIGINS: "*"
    volumes:
      - ./backend:/app
      - /app/__pycache__
    networks:
      - esg-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    command: gunicorn --bind 0.0.0.0:5000 --workers 2 --threads 2 --timeout 60 wsgi:app

  # PostgreSQL database
  postgres:
    image: postgres:14-alpine
    container_name: esg-postgres
    expose:
      - "5432"
    environment:
      POSTGRES_USER: esg_user
      POSTGRES_PASSWORD: esg_password
      POSTGRES_DB: esg_platform
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - ./database/init/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/init/sample_data.sql:/docker-entrypoint-initdb.d/02-sample_data.sql
      - postgres_data:/var/lib/postgresql/data
    networks:
      - esg-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U esg_user -d esg_platform"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # Redis cache & session store
  redis:
    image: redis:7-alpine
    container_name: esg-redis
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    networks:
      - esg-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    command: redis-server --appendonly yes

  # Frontend React app (development with Vite HMR)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NODE_ENV: development
    container_name: esg-frontend
    expose:
      - "5173"
    environment:
      VITE_API_URL: http://localhost/api
      NODE_ENV: development
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - /app/node_modules
    networks:
      - esg-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  esg-network:
    driver: bridge
